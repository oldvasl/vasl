name: Generate TWA Keystore (run once)

on:
  workflow_dispatch:
    inputs:
      alias:
        description: "اسم الیاس کلید (دلخواه، مثلاً android)"
        required: true
        default: "android"
      password:
        description: "پسورد کیستور و کلید (حتماً یادت بمونه!)"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: ساخت کیستور
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias "${{ inputs.alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ inputs.password }}" \
            -keypass "${{ inputs.password }}" \
            -dname "CN=TWA, OU=App, O=App, L=City, S=State, C=IR"

      - name: تبدیل به base64
        run: base64 -w0 android.keystore > android.keystore.b64

      - name: آپلود کیستور به‌عنوان artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-secret-DELETE-AFTER-DOWNLOAD
          path: |
            android.keystore
            android.keystore.b64
          retention-days: 1
