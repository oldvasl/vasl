<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" type="image/png" href="favicon-dark.png" media="(prefers-color-scheme: light)" />
<link rel="icon" type="image/png" href="favicon-light.png" media="(prefers-color-scheme: dark)" />
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --primary: #1A0A31;
    --surface: #241243;
    --card: #2D1856;
    --accent: #8B5CF6;
    --accent-hover: #A78BFA;
    --text: #FFFFFF;
    --subtext: #C9C4D8;
    --border: #3D2A64;
    --success: #22C55E;
    --error: #EF4444;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
    background: var(--primary);
  }
  /* پس‌زمینه‌ی متحرک — سبک: به‌جای انیمیت کردن background-position روی یه گرادیانت بلورشده‌ی بزرگ
     (که هر فریم کل صفحه رو مجبور به رسم دوباره می‌کرد و لگ می‌داد)، چند تا «حباب» جدا داریم که فقط
     transform‌شون انیمیت می‌شه؛ این روی GPU اجرا می‌شه و تقریباً هیچ فشاری به CPU نمی‌ده */
  .bg-anim { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; background: var(--primary); contain: strict; }
  .bg-blob { position: absolute; border-radius: 50%; filter: blur(50px); opacity: 0.5; will-change: transform; transform: translateZ(0); backface-visibility: hidden; }
  .bg-blob:nth-child(1) { width: 50vw; height: 50vw; max-width: 480px; max-height: 480px; background: var(--accent); top: -12%; left: -12%; animation: blob1 22s ease-in-out infinite; }
  .bg-blob:nth-child(2) { width: 45vw; height: 45vw; max-width: 420px; max-height: 420px; background: var(--card); bottom: -14%; right: -10%; animation: blob2 26s ease-in-out infinite; }
  .bg-blob:nth-child(3) { width: 38vw; height: 38vw; max-width: 360px; max-height: 360px; background: var(--accent-hover); top: 25%; right: 5%; animation: blob3 19s ease-in-out infinite; }
  @keyframes blob1 { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(12vw, 10vh, 0); } }
  @keyframes blob2 { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(-10vw, -8vh, 0); } }
  @keyframes blob3 { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(-8vw, 10vh, 0); } }
  /* موقع تایپ (فوکوس روی هر اینپوت)، انیمیشن پس‌زمینه موقتاً متوقف می‌شه تا کیبورد و رندر صفحه رقیب هم نشن و لک از بین بره */
  .bg-anim.is-paused .bg-blob { animation-play-state: paused; }
  @media (prefers-reduced-motion: reduce) {
    .bg-blob { animation: none !important; }
  }
  .box { width: 100%; max-width: 380px; position: relative; z-index: 1; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes shake { 10%, 90% { transform: translateX(-1px); } 20%, 80% { transform: translateX(2px); } 30%, 50%, 70% { transform: translateX(-4px); } 40%, 60% { transform: translateX(4px); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulseDot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  .brand { text-align: center; margin-bottom: 24px; animation: fadeInUp 0.6s ease both; }
  /* به‌جای عکسِ ثابتِ قبلی، همون نشانِ متحرکِ ترکیب‌های «: » و «D» که تو اسپلش‌اسکرینِ اصلیِ اپ هم هست */
  .app-splash-emoji.brand-emoji {
    direction: ltr; font-size: 46px; font-weight: 800; letter-spacing: 1px; color: var(--text);
    min-height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px;
    animation: popIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both, float 4s ease-in-out 0.6s infinite;
  }
  .app-splash-emoji.brand-emoji .splash-caret {
    display: inline-block; width: 3px; height: 36px; background: var(--accent-hover);
    margin-inline-start: 3px; animation: caretBlink 0.9s step-end infinite;
  }
  .brand h1 { font-size: 26px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; }
  .brand p { font-size: 13px; color: var(--subtext); margin: 0; }
  #subtitleWord { color: var(--accent-hover); font-weight: 500; }
  .subtitle-caret {
    display: inline-block; width: 1px; height: 12px; background: var(--accent-hover);
    margin-inline-start: 2px; vertical-align: -1px; animation: caretBlink 0.9s step-end infinite;
  }
  @keyframes caretBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .subtitle-caret { animation: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .brand, .app-splash-emoji, .card, .turnstile-wrap { animation: none !important; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    animation: fadeInUp 0.6s ease 0.1s both;
    transition: box-shadow 0.3s ease;
  }

  .tabs { display: flex; gap: 4px; background: var(--primary); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
  .tabs button {
    flex: 1; padding: 9px; border: none; border-radius: 8px; background: transparent;
    font-family: inherit; font-size: 14px; color: var(--subtext); cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease, transform 0.15s ease;
  }
  .tabs button.active { background: var(--card); color: var(--text); font-weight: 500; animation: popIn 0.3s ease both; }
  .tabs button:active { transform: scale(0.95); }

  input {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--text);
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; margin-bottom: 10px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
  }
  input::placeholder { color: var(--subtext); }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25); transform: translateY(-1px); }

  #loginForm, #registerForm { animation: fadeIn 0.35s ease both; }

  button.primary {
    width: 100%; padding: 11px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff; font-family: inherit; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    position: relative;
  }
  button.primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 6px 18px rgba(139, 92, 246, 0.35); transform: translateY(-1px); }
  button.primary:active:not(:disabled) { transform: translateY(0) scale(0.98); }
  button.primary:disabled { opacity: 0.7; cursor: default; }
  button.primary.loading { color: transparent; }
  button.primary.loading::after {
    content: ""; position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
    margin: -8px 0 0 -8px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }

  .error { color: var(--error); font-size: 13px; margin-top: 8px; min-height: 16px; }
  .error.shake { animation: shake 0.4s ease; }
  .hint { color: var(--success); font-size: 13px; margin-top: 8px; min-height: 16px; }
  .hint:not(:empty) { animation: fadeInUp 0.3s ease both; }
  .hidden { display: none !important; }

  .turnstile-wrap { display: flex; justify-content: center; margin-bottom: 10px; animation: fadeIn 0.6s ease 0.2s both; }

  .sound-toggle {
    position: fixed; top: 16px; left: 16px; width: 38px; height: 38px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border); color: var(--subtext);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    z-index: 2; transition: transform 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    animation: popIn 0.5s ease 0.3s both;
  }
  .sound-toggle:hover { transform: scale(1.08) rotate(-6deg); color: var(--accent-hover); border-color: var(--accent); }
  .sound-toggle:active { transform: scale(0.94); }
  .sound-toggle svg { width: 17px; height: 17px; transition: transform 0.2s ease; }
  .sound-toggle .icon-muted { display: none; }
  .sound-toggle.muted .icon-on { display: none; }
  .sound-toggle.muted .icon-muted { display: block; }
  /* --- اسپلش ویدیویی قبل از ورود --- */
  .splash-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
    overflow: hidden;
    transition: opacity 0.6s ease;
  }
  .splash-overlay.fade-out { opacity: 0; pointer-events: none; }
  .splash-overlay video {
    position: absolute; top: 50%; left: 50%;
    width: 100%; height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover; object-position: center;
    display: block;
  }
  body.splash-active { overflow: hidden; }
</style>
</head>
<body class="splash-active">

<div class="splash-overlay" id="splashOverlay">
  <video id="splashVideo" src="splash.mp4" playsinline webkit-playsinline></video>
</div>
<script>
// این اسکریپت عمداً بلافاصله بعد از خودِ اُوِرلی اومده، نه پایین فایل کنار بقیه‌ی اسکریپت‌ها،
// چون باید همون لحظه که ویدیو تو DOM ساخته می‌شه پلی و گوش‌سپاری روش شروع بشه؛ صفحه‌ی اصلی
// (فرم لاگین و بقیه‌ی المان‌ها) زیر این اُوِرلیِ سیاه در حال لود شدنه و کاربر چیزی جز ویدیو نمی‌بینه.
(function () {
  var overlay = document.getElementById("splashOverlay");
  var video = document.getElementById("splashVideo");
  if (!overlay || !video) return;
  var done = false;
  function finishSplash() {
    if (done) return;
    done = true;
    overlay.classList.add("fade-out");
    document.body.classList.remove("splash-active");
    setTimeout(function () {
      overlay.remove();
      // آهنگ لاگین عمداً همینجا و نه زودتر استارت می‌خوره، تا دقیقاً بعد از محو کامل شدن
      // اسپلش پخش بشه؛ تابع tryAutoplay پایین همین فایل (کنار المان bgMusic) تعریف شده و
      // چون یه function declaration معمولیه، تا این لحظه (که خیلی بعد از پارس کل صفحه‌ست) در دسترسه.
      if (typeof tryAutoplay === "function") tryAutoplay();
    }, 650);
  }
  video.addEventListener("ended", finishSplash);
  video.addEventListener("error", function () {
    // اگه ویدیو لود نشه (مثلاً مسیرش اشتباهه یا فایل رو ریپو نیست)، خطاش رو رو همون
    // نوار قرمز debugBanner (که پایین‌تر تو فایل تعریف شده) نشون بده تا رو موبایل هم دیده بشه
    var banner = document.getElementById("debugBanner");
    if (banner) {
      var code = video.error ? video.error.code : "?";
      banner.style.display = "block";
      banner.textContent = "خطای بارگذاری ویدیوی اسپلش (کد " + code + ") — مسیر: " + video.currentSrc;
    }
    finishSplash();
  });
  // همیشه اول با muted=true پلی می‌کنیم — این تنها حالتیه که همه‌ی مرورگرها بدون تعامل قبلی
  // کاربر تضمینش می‌کنن. بلافاصله بعدش سعی می‌کنیم صدا رو باز کنیم؛ اگه باز کردنِ صدا باعث شد
  // مرورگر خودش پخش رو متوقف کنه (بعضی مرورگرها این کارو می‌کنن)، دوباره mute می‌کنیم و
  // play() رو صدا می‌زنیم تا ویدیو در هر صورت (با یا بی‌صدا) ادامه پیدا کنه و هیچ‌وقت گیر نکنه.
  function startSplashVideo() {
    video.muted = true;
    var p = video.play();
    if (p && p.catch) p.catch(finishSplash);
    setTimeout(function () {
      video.muted = false;
      var p2 = video.play();
      if (p2 && p2.catch) {
        p2.catch(function () {
          video.muted = true;
          video.play().catch(function () {});
        });
      }
    }, 150);
  }
  startSplashVideo();
  // شبکه‌ی ایمنی: اگه ایونت‌ها به هر دلیلی شلیک نشن، حداکثر بعد از طول ویدیو + کمی حاشیه رد شو
  setTimeout(finishSplash, 12000);
})();
</script>

<div class="bg-anim"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div id="debugBanner" style="display:none; position:fixed; top:0; left:0; right:0; z-index:99; background:#EF4444; color:#fff; font-family:monospace; font-size:12px; padding:8px 10px; direction:ltr; text-align:left; word-break:break-all; max-height:40vh; overflow:auto;"></div>
<audio id="bgMusic" src="login.mp3" loop></audio>
<button class="sound-toggle" id="soundToggle" onclick="toggleSound()" aria-label="قطع/وصل صدا">
  <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a9 9 0 0 1 0 12"/></svg>
  <svg class="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M17 9l6 6M23 9l-6 6"/></svg>
</button>

<div class="box">
  <div class="brand">
    <div class="app-splash-emoji brand-emoji" id="brandEmoji"><span class="emoji-text"></span><span class="splash-caret"></span></div>
    <h1>دهات</h1>
    <p>کاردستی چرت عاقی</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button id="tabLogin" class="active" onclick="showLogin()">ورود</button>
      <button id="tabRegister" onclick="showRegister()">ثبت‌نام</button>
    </div>

    <div id="loginForm">
      <input id="loginUsername" placeholder="نام کاربری" autocomplete="username" maxlength="20" />
      <input id="loginPassword" type="password" placeholder="رمز عبور" autocomplete="current-password" maxlength="100" />
      <div class="turnstile-wrap">
        <div id="turnstileBox"></div>
      </div>
      <button class="primary" id="loginBtn" onclick="login()">ورود</button>
      <div class="error" id="loginError"></div>
    </div>

    <div id="registerForm" class="hidden">
      <input id="regUsername" placeholder="نام کاربری (حداقل ۳ کاراکتر)" autocomplete="username" maxlength="20" />
      <input id="regPassword" type="password" placeholder="رمز عبور (حداقل ۸ کاراکتر، شامل حرف و عدد)" autocomplete="new-password" maxlength="100" />
      <div class="turnstile-wrap">
        <div id="turnstileBoxReg"></div>
      </div>
      <button class="primary" id="registerBtn" onclick="register()">ساخت حساب</button>

      <div class="hint" id="registerHint"></div>
    </div>

<script src="subtitle-words.html"></script>
<script>
const WORKER_URL = "https://dehaat-proxy.toopzsupport.workers.dev";
const TURNSTILE_SITEKEY = "0x4AAAAAADzYo0FCb7d3eKh0";

// ---------- رندر صریح Turnstile ----------
// چرا صریح؟ توی رندر خودکار (implicit / class="cf-turnstile")، تابع getResponse باید شناسه‌ی
// داخلیِ ویجت رو بگیره نه آیدیِ دیو container رو؛ اون شناسه‌ی داخلی جایی در دسترس کد ما نبود،
// برای همین حتی بعد از تیک خوردن و "Success"، getResponse همیشه خالی برمی‌گشت.
// با رندر صریح، خودمون widgetId واقعی رو از خروجی render() نگه می‌داریم و همون رو به getResponse/reset می‌دیم.
const turnstileWidgets = { login: null, register: null };
function onTurnstileReady() {
  turnstileWidgets.login = turnstile.render("#turnstileBox", { sitekey: TURNSTILE_SITEKEY, theme: "dark" });
  turnstileWidgets.register = turnstile.render("#turnstileBoxReg", { sitekey: TURNSTILE_SITEKEY, theme: "dark" });
}

// ---------- نمایش هر خطای جاوااسکریپت روی صفحه (چون رو موبایل به کنسول دسترسی نیست) ----------
window.addEventListener("error", function (e) {
  const banner = document.getElementById("debugBanner");
  banner.style.display = "block";
  banner.textContent = "خطا: " + (e.message || "") + " — فایل: " + (e.filename || "") + " — خط: " + (e.lineno || "");
});
window.addEventListener("unhandledrejection", function (e) {
  const banner = document.getElementById("debugBanner");
  banner.style.display = "block";
  banner.textContent = "خطای Promise: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
});

// ---------- نشانِ متحرکِ ترکیب‌های «:» و «D» (لوگوی صفحه‌ی لاگین): همون افکتِ تایپِ اسپلش‌اسکرینِ اصلیِ اپ ----------
(function initBrandEmoji() {
  const COMBOS = [":D", "D:", ":DD", "DD:", "::D", "D::", ":D:D", "D:D:"];
  const host = document.querySelector("#brandEmoji .emoji-text");
  if (!host) return;

  let comboIndex = 0;
  let charIndex = 0;
  let phase = "typing";

  function tick() {
    if (document.hidden) { setTimeout(tick, 400); return; }

    const combo = COMBOS[comboIndex];
    if (phase === "typing") {
      charIndex++;
      host.textContent = combo.slice(0, charIndex);
      if (charIndex >= combo.length) {
        phase = "pausing";
        setTimeout(tick, 1100);
      } else {
        setTimeout(tick, 110 + Math.random() * 70);
      }
      return;
    }
    if (phase === "pausing") {
      phase = "deleting";
      setTimeout(tick, 20);
      return;
    }
    charIndex--;
    host.textContent = combo.slice(0, charIndex);
    if (charIndex <= 0) {
      comboIndex = (comboIndex + 1) % COMBOS.length;
      phase = "typing";
      setTimeout(tick, 250);
    } else {
      setTimeout(tick, 45);
    }
  }
  tick();
})();

// ---------- زیرنویس متحرک: کلمه با افکت تایپ نوشته می‌شه، مکث می‌کنه، با افکت پاک‌شدن حذف می‌شه و کلمه‌ی بعدی از subtitle-words.html میاد ----------
(function initSubtitleTyping() {
  const words = (window.SUBTITLE_WORDS && window.SUBTITLE_WORDS.length) ? window.SUBTITLE_WORDS : ["شومبلکی"];
  const el = document.getElementById("subtitleWord");
  if (!el) return;

  let wordIndex = 0;
  let charIndex = 0;
  let phase = "typing"; // typing -> pausing -> deleting -> (کلمه بعدی) typing

  function tick() {
    // وقتی تب مخفیه اجرا نشه، فقط بعداً دوباره چک کن (صرفه‌جویی در باتری/CPU)
    if (document.hidden) {
      setTimeout(tick, 400);
      return;
    }

    const word = words[wordIndex];

    if (phase === "typing") {
      charIndex++;
      el.textContent = word.slice(0, charIndex);
      if (charIndex >= word.length) {
        phase = "pausing";
        setTimeout(tick, 1500);
      } else {
        setTimeout(tick, 85 + Math.random() * 70);
      }
      return;
    }

    if (phase === "pausing") {
      phase = "deleting";
      setTimeout(tick, 20);
      return;
    }

    // phase === "deleting"
    charIndex--;
    el.textContent = word.slice(0, charIndex);
    if (charIndex <= 0) {
      wordIndex = (wordIndex + 1) % words.length;
      phase = "typing";
      setTimeout(tick, 350);
    } else {
      setTimeout(tick, 35 + Math.random() * 30);
    }
  }

  tick();
})();

if (localStorage.getItem("token")) {
  window.location.href = "index.html";
}

// ---------- رفع لک هنگام تایپ: تا وقتی کاربر روی یه اینپوت فوکوسه، انیمیشن پس‌زمینه رو متوقف می‌کنیم
// چون رندر مداوم بلور‌های پس‌زمینه هم‌زمان با باز شدن کیبورد/کرسر چشمک‌زن می‌تونه باعث لک بشه ----------
const bgAnimEl = document.querySelector(".bg-anim");
document.addEventListener("focusin", (e) => {
  if (e.target.tagName === "INPUT") bgAnimEl.classList.add("is-paused");
});
document.addEventListener("focusout", (e) => {
  if (e.target.tagName === "INPUT") bgAnimEl.classList.remove("is-paused");
});
// وقتی تب مرورگر مخفیه هم انیمیشن رو نگه می‌داریم؛ فایده‌ای نداره و فقط باتری/CPU مصرف می‌کنه
document.addEventListener("visibilitychange", () => {
  bgAnimEl.classList.toggle("is-paused", document.hidden);
});

// نمایش خطا همراه با یه لرزش کوتاه، تا کاربر متوجه بشه پیام تغییر کرده
function setError(el, msg) {
  el.textContent = msg;
  el.classList.remove("shake");
  if (msg) {
    // برای اینکه انیمیشن دوباره از اول اجرا بشه حتی اگه پشت‌سرهم صدا زده بشه
    void el.offsetWidth;
    el.classList.add("shake");
  }
}

// هر بار فرم دیده می‌شه، انیمیشن ورودش رو دوباره از اول اجرا می‌کنیم
function replayFormAnim(el) {
  el.style.animation = "none";
  void el.offsetWidth;
  el.style.animation = "";
}

function showLogin() {
  document.getElementById("tabLogin").classList.add("active");
  document.getElementById("tabRegister").classList.remove("active");
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("registerForm").classList.add("hidden");
  replayFormAnim(document.getElementById("loginForm"));
}
function showRegister() {
  document.getElementById("tabRegister").classList.add("active");
  document.getElementById("tabLogin").classList.remove("active");
  document.getElementById("registerForm").classList.remove("hidden");
  document.getElementById("loginForm").classList.add("hidden");
  replayFormAnim(document.getElementById("registerForm"));
}

async function register() {
  const username = document.getElementById("regUsername").value.trim();
  const password = document.getElementById("regPassword").value;
  const errEl = document.getElementById("registerError");
  const hintEl = document.getElementById("registerHint");
  const btn = document.getElementById("registerBtn");
  setError(errEl, "");
  hintEl.textContent = "";

  if (!/^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(password)) {
    setError(errEl, "رمز عبور باید حداقل ۸ کاراکتر باشه و شامل حداقل یه حرف و یه عدد باشه");
    return;
  }

  const turnstileToken = (() => {
    try {
      return window.turnstile ? turnstile.getResponse(turnstileWidgets.register) : "";
    } catch (e) {
      return "";
    }
  })();
  if (window.turnstile && !turnstileToken) {
    setError(errEl, "لطفاً تیک تایید امنیتی رو بزن");
    return;
  }

  btn.disabled = true;
  btn.classList.add("loading");
  btn.textContent = "در حال ساخت حساب...";
  try {
    const res = await fetch(`${WORKER_URL}/api/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password, turnstileToken }),
    });
    const data = await res.json();
    if (!res.ok) {
      setError(errEl, data.error);
      if (window.turnstile) turnstile.reset(turnstileWidgets.register);
      return;
    }
    hintEl.textContent = "حساب ساخته شد — حالا وارد شو";
    setTimeout(() => {
      showLogin();
      document.getElementById("loginUsername").value = username;
    }, 900);
  } catch (e) {
    setError(errEl, "اتصال به سرور برقرار نشد. اینترنتت رو چک کن.");
    if (window.turnstile) turnstile.reset(turnstileWidgets.register);
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.textContent = "ساخت حساب";
  }
}

async function login() {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errEl = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");
  setError(errEl, "");

  const turnstileToken = (() => {
    try {
      return window.turnstile ? turnstile.getResponse(turnstileWidgets.login) : "";
    } catch (e) {
      return "";
    }
  })();
  if (window.turnstile && !turnstileToken) {
    setError(errEl, "لطفاً تیک تایید امنیتی رو بزن");
    return;
  }

  btn.disabled = true;
  btn.classList.add("loading");
  btn.textContent = "در حال ورود...";
  try {
    const res = await fetch(`${WORKER_URL}/api/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password, turnstileToken }),
    });
    const data = await res.json();
    if (!res.ok) {
      setError(errEl, data.error);
      if (window.turnstile) turnstile.reset(turnstileWidgets.login);
      return;
    }
    localStorage.setItem("token", data.token);
    localStorage.setItem("username", data.username);
    window.location.href = "index.html";
  } catch (e) {
    setError(errEl, "اتصال به سرور برقرار نشد. اینترنتت رو چک کن.");
    if (window.turnstile) turnstile.reset(turnstileWidgets.login);
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.textContent = "ورود";
  }
}

// ---------- صدای پس‌زمینه ----------
const bgMusic = document.getElementById("bgMusic");
bgMusic.volume = 0.5;

// ترفند رایج برای بیشینه کردن شانس پخش خودکارِ صدادار: مرورگرها پخش خودکارِ بی‌صدا رو همیشه مجاز می‌دونن،
// پس اول با mute شروع می‌کنیم (این تضمینیه) و بلافاصله سعی می‌کنیم صداش رو باز کنیم. تو خیلی از مرورگرها
// (مخصوصاً اگه کاربر قبلاً با سایت تعامل داشته) همین باعث می‌شه صدا واقعاً بدون نیاز به کلیک پخش بشه.
// اگه هیچ‌کدوم جواب نداد (خیلی از مرورگرها این حالت رو هم می‌بندن)، با اولین لمس/کلیک روی صفحه شروع می‌شه.
function tryAutoplay() {
  bgMusic.muted = true;
  bgMusic.play()
    .then(() => {
      // چند میلی‌ثانیه بعد از شروعِ بی‌صدا، سعی می‌کنیم صداش رو باز کنیم
      setTimeout(() => {
        if (document.getElementById("soundToggle").classList.contains("muted")) return;
        bgMusic.muted = false;
        // بعضی مرورگرها با باز شدن صدا، خودشون پخش رو متوقف می‌کنن؛ اگه این اتفاق افتاد، دوباره تلاش می‌کنیم
        bgMusic.play().catch(() => {});
        if (bgMusic.paused) armGestureFallback();
      }, 300);
    })
    .catch(() => {
      armGestureFallback();
    });
}
function armGestureFallback() {
  document.addEventListener("click", startOnUserGesture, { once: true });
  document.addEventListener("touchstart", startOnUserGesture, { once: true });
}
function startOnUserGesture() {
  if (document.getElementById("soundToggle").classList.contains("muted")) return;
  bgMusic.muted = false;
  bgMusic.play().catch(() => {});
}
// توجه: tryAutoplay() دیگه اینجا مستقیم صدا زده نمی‌شه — فراخوانیش به تابع finishSplash
// (بالای فایل، کنار المان اسپلش) منتقل شده تا آهنگ دقیقاً بعد از محو شدن ویدیوی اسپلش شروع بشه.

function toggleSound() {
  const btn = document.getElementById("soundToggle");
  if (bgMusic.paused || bgMusic.muted) {
    bgMusic.muted = false;
    bgMusic.play().catch(() => {});
    btn.classList.remove("muted");
  } else {
    bgMusic.pause();
    btn.classList.add("muted");
  }
}
</script>
