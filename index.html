<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasl</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<section id="loginPage" class="page active">

<div class="centerBox">

<h1 class="logo">Vasl</h1>

<p class="sub">ورود به شبکه اجتماعی</p>

<input type="text" id="username" placeholder="نام کاربری">
<input type="password" id="password" placeholder="رمز عبور">

<button onclick="login()">ورود</button>

<p class="small">حساب نداری؟ ثبت‌نام موقت همینجا انجام میشه</p>

</div>

</section>

<!-- HOME -->
<section id="homePage" class="page">

<header>
<div class="logoSmall">Vasl</div>
<button onclick="logout()">خروج</button>
</header>

<div class="postBox">

<textarea id="postText" placeholder="چه خبر؟"></textarea>

<button onclick="createPost()">ارسال پست</button>

</div>

<div id="feed"></div>

</section>

<script src="script.js">
  <script>
alert("HTML OK");
</script>
</script>
</body>
</html>
