function renderPost(p, num) {
  const initial = p.username ? p.username[0].toUpperCase() : "?";
  const hasMedia = (p.type === "photo" || p.type === "video" || p.type === "audio" || p.type === "document") && p.file_id;
  const canDelete = p.username === getUsername() || isAdmin;
  const numStr = String(num).padStart(6, "0");
  const safeId = p.id.replace(/[^a-zA-Z0-9_]/g, "");

  const deleteBtn = canDelete ? `<button class="delete-btn" onclick="deletePost('${p.id}','${safeId}')">حذف</button>` : "";
  const avatarHtml = p.avatar_file_id
    ? `<div class="avatar" style="overflow:hidden;"><img src="${WORKER_URL}/api/media/${p.avatar_file_id}" style="width:100%;height:100%;object-fit:cover;" /></div>`
    : `<div class="avatar" style="background:${avatarColor(p.username || "")}">${initial}</div>`;
  const header = `
    <div class="entry-top">
      ${avatarHtml}
      <span class="entry-name username-link" onclick="openProfile('${p.username}')">${escapeHtml(p.username)}</span>
      <div class="entry-meta">
        <span class="entry-num">#${numStr}</span>
        ${deleteBtn}
      </div>
    </div>`;
  const textHtml = p.text ? `<div class="entry-text">${escapeHtml(p.text)}</div>` : "";
  const timeHtml = `<div class="entry-time">${new Date(p.date).toLocaleString("fa-IR")}</div>`;

  // ---------- نوار اکشن (آپ‌ووت / داون‌ووت / لایک / کامنت / دانلود) ----------
  const score = (p.upvotes || 0) - (p.downvotes || 0);
  const userVote = p.userVote || null;
  const liked = !!p.liked;
  const likesCount = p.likes || 0;

  const downloadExtByType = { photo: "jpg", video: "mp4", audio: "mp3", document: "bin" };
  const downloadExt = downloadExtByType[p.type];
  const downloadBtn = hasMedia
    ? `<button class="action-pill download" onclick="downloadPostMedia('${WORKER_URL}/api/media/${p.file_id}','${safeId}','${downloadExt}')" title="دانلود" aria-label="دانلود">${ICON_DOWNLOAD}</button>`
    : `<button class="action-pill download disabled" disabled title="فایلی برای دانلود نیست" aria-label="دانلود">${ICON_DOWNLOAD}</button>`;

  const actionBar = `
    <div class="action-bar">
      <button class="action-pill up${userVote === "up" ? " active" : ""}" id="upBtn-${safeId}" onclick="voteOnPost('${p.id}','${safeId}','up')" title="آپ‌ووت" aria-label="آپ‌ووت">
        ${ICON_ARROW_UP}<span class="count" id="voteScore-${safeId}">${score}</span>
      </button>
      <button class="action-pill down${userVote === "down" ? " active" : ""}" id="downBtn-${safeId}" onclick="voteOnPost('${p.id}','${safeId}','down')" title="داون‌ووت" aria-label="داون‌ووت">
        ${ICON_ARROW_DOWN}
      </button>
      <button class="action-pill like${liked ? " active" : ""}" id="likeBtn-${safeId}" onclick="toggleLike('${p.id}','${safeId}')" title="سیو" aria-label="سیو">
        ${ICON_HEART}<span class="count" id="likeCount-${safeId}">${likesCount}</span>
      </button>
      <button class="action-pill comment" onclick="toggleComments('${p.id}','${safeId}')" title="کامنت‌ها" aria-label="کامنت‌ها">
        ${ICON_COMMENT}
      </button>
      ${downloadBtn}
    </div>`;

  const commentsBlock = `
    <div class="comments-section hidden" id="comments-${safeId}">
      <div class="comment-input-bar">
        <button class="comment-emoji-btn" onclick="commentEmojiClicked('${p.id}','${safeId}')" title="ایموجی" aria-label="ایموجی">${ICON_SMILE}</button>
        <input type="text" id="commentInput-${safeId}" placeholder="افکارتو بنویس..." onkeydown="if(event.key==='Enter') submitComment('${p.id}','${safeId}')" />
        <button class="comment-send-btn" onclick="submitComment('${p.id}','${safeId}')" title="ارسال" aria-label="ارسال">${ICON_SEND}</button>
      </div>
      <div class="error" id="commentError-${safeId}"></div>
      <div class="comments-list" id="commentsList-${safeId}"></div>
    </div>`;

  if (!hasMedia) {
    return `<div class="text-entry" id="post-${safeId}">${header}${textHtml}${timeHtml}${actionBar}${commentsBlock}</div>`;
  }

  let mediaHtml = "";
  if (p.type === "photo") {
    mediaHtml = `<div class="entry-media"><img src="${WORKER_URL}/api/media/${p.file_id}" loading="lazy" /></div>`;
  } else if (p.type === "video") {
    mediaHtml = `<div class="entry-media"><video src="${WORKER_URL}/api/media/${p.file_id}" controls></video></div>`;
  } else if (p.type === "audio") {
    mediaHtml = `<div class="entry-media has-audio">${buildAudioPlayer(p.file_id, safeId, p.audio_thumb, p.audio_title, p.audio_performer, p.id)}</div>`;
  } else if (p.type === "document") {
    mediaHtml = `<div class="entry-doc">فایل پیوست — <a href="${WORKER_URL}/api/media/${p.file_id}" target="_blank">دانلود</a></div>`;
  }

  return `<div class="post-card" id="post-${safeId}">${header}${mediaHtml}${textHtml}${timeHtml}<div class="comments-wrap">${actionBar}${commentsBlock}</div></div>`;
}

function isDesktopMediaLayout() {
  return window.matchMedia("(min-width: 900px)").matches;
}

function appendMediaPost(html) {
  if (!isDesktopMediaLayout()) {
    document.getElementById("mediaCol0").insertAdjacentHTML("beforeend", html);
    return;
  }
  // همیشه به کوتاه‌ترین ستون (کمترین تعداد فرزند) اضافه می‌شه، نه اینکه کل چیدمان از نو حساب بشه
  const cols = [0, 1, 2].map((i) => document.getElementById(`mediaCol${i}`));
  cols.sort((a, b) => a.children.length - b.children.length);
  cols[0].insertAdjacentHTML("beforeend", html);
}

async function loadFeedView(kind, reset = true) {
  if (kind === "media") {
    const footerEl = document.getElementById("mediaFeedFooter");
    if (reset) {
      feedState.media.page = 1;
      ["mediaCol0", "mediaCol1", "mediaCol2"].forEach((id) => { document.getElementById(id).innerHTML = ""; });
      footerEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
    }
    try {
      const res = await fetch(`${WORKER_URL}/api/feed?filter=media&page=${feedState.media.page}&pageSize=${PAGE_SIZE}`, {
        headers: { "Authorization": `Bearer ${getToken()}` },
      });
      const data = await res.json();
      feedState.media.loaded = true;

      if (reset && (!data.posts || data.posts.length === 0)) {
        footerEl.innerHTML = `<div class="empty-state">هنوز رسانه‌ای ثبت نشده — اولین نفر باش.</div>`;
        return;
      }
      if (reset) footerEl.innerHTML = "";

      const startIndex = (feedState.media.page - 1) * PAGE_SIZE;
      data.posts.forEach((p, i) => {
        appendMediaPost(renderPost(p, data.total - (startIndex + i)));
      });
      bindAllAudioPlayers(document.getElementById("mediaFeed"));

      const oldBtn = document.getElementById("loadMoreBtn-media");
      if (oldBtn) oldBtn.remove();
      if (data.hasMore) {
        footerEl.insertAdjacentHTML("beforeend", `<button class="load-more-btn" id="loadMoreBtn-media" onclick="loadMoreFeed('media')">بارگذاری بیشتر</button>`);
      }
    } catch (e) {
      if (reset) footerEl.innerHTML = `<div class="empty-state">فید بارگذاری نشد. اتصال اینترنتت رو چک کن.</div>`;
    }
    return;
  }

  const containerId = "textFeed";
  const feedEl = document.getElementById(containerId);
  if (reset) {
    feedState[kind].page = 1;
    feedEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
  }
  try {
    const res = await fetch(`${WORKER_URL}/api/feed?filter=${kind}&page=${feedState[kind].page}&pageSize=${PAGE_SIZE}`, {
      headers: { "Authorization": `Bearer ${getToken()}` },
    });
    const data = await res.json();
    feedState[kind].loaded = true;

    if (reset && (!data.posts || data.posts.length === 0)) {
      const emptyMsg = "هنوز متنی ثبت نشده";
      feedEl.innerHTML = `<div class="empty-state">${emptyMsg} — اولین نفر باش.</div>`;
      return;
    }
    if (reset) feedEl.innerHTML = "";

    const startIndex = (feedState[kind].page - 1) * PAGE_SIZE;
    const html = data.posts.map((p, i) => renderPost(p, data.total - (startIndex + i))).join("");
    feedEl.insertAdjacentHTML("beforeend", html);
    bindAllAudioPlayers(feedEl);

    const oldBtn = document.getElementById(`loadMoreBtn-${kind}`);
    if (oldBtn) oldBtn.remove();
    if (data.hasMore) {
      feedEl.insertAdjacentHTML("beforeend", `<button class="load-more-btn" id="loadMoreBtn-${kind}" onclick="loadMoreFeed('${kind}')">بارگذاری بیشتر</button>`);
    }
  } catch (e) {
    if (reset) feedEl.innerHTML = `<div class="empty-state">فید بارگذاری نشد. اتصال اینترنتت رو چک کن.</div>`;
  }
}

function loadMoreFeed(kind) {
  feedState[kind].page++;
  loadFeedView(kind, false);
}

// ---------- تب موسیقی: لیست همه‌ی آهنگ‌های آپلود شده تو سایت ----------
function renderMusicRow(p) {
  const safeId = p.id.replace(/[^a-zA-Z0-9_]/g, "");
  audioMetaRegistry[safeId] = {
    postId: p.id,
    title: p.audio_title || "",
    performer: p.audio_performer || "",
    thumbFileId: p.audio_thumb || null,
  };

  const coverHtml = p.audio_thumb
    ? `<img src="${WORKER_URL}/api/media/${p.audio_thumb}" alt="" />`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;

  const titleText = p.audio_title || "بدون‌عنوان";
  const subParts = [];
  if (p.audio_performer) subParts.push(escapeHtml(p.audio_performer));
  subParts.push(escapeHtml(p.username));
  const subText = subParts.join(" — ");

  return `
    <div class="music-row">
      <audio id="audioEl-${safeId}" src="${WORKER_URL}/api/media/${p.file_id}" preload="none"></audio>
      <div class="music-row-cover" onclick="openFullPlayer('${safeId}')" title="پخش تمام‌صفحه">${coverHtml}</div>
      <div class="music-row-info" onclick="toggleAudio('${safeId}')" title="پخش/توقف">
        <div class="music-row-title">${escapeHtml(titleText)}</div>
        <div class="music-row-sub">${subText}</div>
      </div>
      <button class="music-row-play" id="audioBtn-${safeId}" onclick="toggleAudio('${safeId}')" title="پخش/توقف" aria-label="پخش/توقف">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        <span class="icon-loading"></span>
      </button>
    </div>`;
}

async function loadAdminFeed(reset = true) {
  const feedEl = document.getElementById("adminFeed");
  const statsEl = document.getElementById("adminStats");
  if (reset) {
    feedState.admin.page = 1;
    feedEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
  }
  try {
    const [statsRes, feedRes] = await Promise.all([
      fetch(`${WORKER_URL}/api/admin/stats`, { headers: { "Authorization": `Bearer ${getToken()}` } }),
      fetch(`${WORKER_URL}/api/feed?filter=all&page=${feedState.admin.page}&pageSize=${PAGE_SIZE}`, {
        headers: { "Authorization": `Bearer ${getToken()}` },
      }),
    ]);

    const statsData = await statsRes.json();
    if (statsRes.ok) {
      statsEl.innerHTML = `
        <div class="admin-stat-box"><div class="num">${statsData.stats.users}</div><div class="label">کاربر</div></div>
        <div class="admin-stat-box"><div class="num">${statsData.stats.posts}</div><div class="label">پست</div></div>
        <div class="admin-stat-box"><div class="num">${statsData.stats.comments}</div><div class="label">کامنت</div></div>
      `;
    } else {
      statsEl.textContent = statsData.error || "دسترسی نداری";
    }

    const data = await feedRes.json();
    feedState.admin.loaded = true;

    if (reset && (!data.posts || data.posts.length === 0)) {
      feedEl.innerHTML = `<div class="empty-state">پستی وجود نداره</div>`;
      return;
    }
    if (reset) feedEl.innerHTML = "";

    const startIndex = (feedState.admin.page - 1) * PAGE_SIZE;
    const html = data.posts.map((p, i) => renderPost(p, data.total - (startIndex + i))).join("");
    feedEl.insertAdjacentHTML("beforeend", html);
    bindAllAudioPlayers(feedEl);

    const oldBtn = document.getElementById("loadMoreBtn-admin");
    if (oldBtn) oldBtn.remove();
    if (data.hasMore) {
      feedEl.insertAdjacentHTML("beforeend", `<button class="load-more-btn" id="loadMoreBtn-admin" onclick="loadMoreAdmin()">بارگذاری بیشتر</button>`);
    }
  } catch (e) {
    if (reset) feedEl.innerHTML = `<div class="empty-state">بارگذاری نشد</div>`;
  }
}

function loadMoreAdmin() {
  feedState.admin.page++;
  loadAdminFeed(false);
}

// ---------- کاربران پنل مدیریت ----------
const adminUsersState = { page: 1, search: "", loaded: false };
let adminUserSearchTimer = null;

function setAdminTab(tab) {
  document.getElementById("adminTab-posts").classList.toggle("active", tab === "posts");
  document.getElementById("adminTab-users").classList.toggle("active", tab === "users");
  document.getElementById("adminTab-reports").classList.toggle("active", tab === "reports");
  document.getElementById("adminPostsSection").classList.toggle("hidden", tab !== "posts");
  document.getElementById("adminUsersSection").classList.toggle("hidden", tab !== "users");
  document.getElementById("adminReportsSection").classList.toggle("hidden", tab !== "reports");

  if (tab === "users" && !adminUsersState.loaded) {
    loadAdminUsers(true);
  }
  if (tab === "reports" && !adminReportsState.loaded) {
    loadAdminReports(true);
  }
}

function onAdminUserSearch() {
  clearTimeout(adminUserSearchTimer);
  adminUserSearchTimer = setTimeout(() => {
    adminUsersState.search = document.getElementById("adminUserSearch").value.trim();
    loadAdminUsers(true);
  }, 350);
}

function renderUserRow(u) {
  const joined = u.created_at ? new Date(u.created_at).toLocaleDateString("fa-IR") : "-";
  const banTag = u.banned ? `<span class="banned-tag">مسدود</span>` : "";
  const adminTag = u.is_super_admin
    ? `<span class="admin-tag super">مالک سایت</span>`
    : (u.is_admin ? `<span class="admin-tag">ادمین</span>` : "");

  // فقط مالک سایت اجازه مسدود کردن ادمین‌های دیگه رو داره؛ خودش هم قابل مسدود شدن نیست
  let banBtn = "";
  if (!u.is_super_admin && (isSuperAdmin || !u.is_admin)) {
    banBtn = u.banned
      ? `<button class="unban-btn" onclick="toggleBan('${u.username}', false)">رفع مسدودی</button>`
      : `<button class="ban-btn" onclick="toggleBan('${u.username}', true)">مسدود کردن</button>`;
  }

  // فقط مالک سایت اجازه ارتقا/عزل ادمین داره
  let roleBtn = "";
  if (isSuperAdmin && !u.is_super_admin) {
    roleBtn = u.is_admin
      ? `<button class="unban-btn" onclick="toggleAdminRole('${u.username}', false)">عزل از ادمین</button>`
      : `<button class="ban-btn" onclick="toggleAdminRole('${u.username}', true)">ارتقا به ادمین</button>`;
  }

  return `
    <div class="admin-user-row">
      <div>
        <span class="admin-user-name">${escapeHtml(u.username)}</span>${adminTag}${banTag}
        <div class="admin-user-date">عضویت: ${joined}</div>
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        ${roleBtn}
        ${banBtn}
      </div>
    </div>`;
}

async function loadAdminUsers(reset = true) {
  const listEl = document.getElementById("adminUsersList");
  if (reset) {
    adminUsersState.page = 1;
    listEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
  }
  try {
    const res = await fetch(
      `${WORKER_URL}/api/admin/users?search=${encodeURIComponent(adminUsersState.search)}&page=${adminUsersState.page}&pageSize=20`,
      { headers: { "Authorization": `Bearer ${getToken()}` } }
    );
    const data = await res.json();
    adminUsersState.loaded = true;

    if (!res.ok) {
      listEl.innerHTML = `<div class="empty-state">${escapeHtml(data.error || "دسترسی نداری")}</div>`;
      return;
    }

    if (reset && (!data.users || data.users.length === 0)) {
      listEl.innerHTML = `<div class="empty-state">کاربری پیدا نشد</div>`;
      return;
    }
    if (reset) listEl.innerHTML = "";

    listEl.insertAdjacentHTML("beforeend", data.users.map(renderUserRow).join(""));

    const oldBtn = document.getElementById("loadMoreBtn-adminUsers");
    if (oldBtn) oldBtn.remove();
    if (data.hasMore) {
      listEl.insertAdjacentHTML("beforeend", `<button class="load-more-btn" id="loadMoreBtn-adminUsers" onclick="loadMoreAdminUsers()">بارگذاری بیشتر</button>`);
    }
  } catch (e) {
    if (reset) listEl.innerHTML = `<div class="empty-state">بارگذاری نشد</div>`;
  }
}

function loadMoreAdminUsers() {
  adminUsersState.page++;
  loadAdminUsers(false);
}

async function toggleBan(username, banned) {
  const confirmMsg = banned ? `مطمئنی می‌خوای «${username}» رو مسدود کنی؟` : `رفع مسدودی «${username}»؟`;
  if (!confirm(confirmMsg)) return;
  try {

function buildCommentGroups(comments) {
  const byId = {};
  comments.forEach((c) => { byId[c.id] = c; });
  function findRoot(c) {
    let cur = c;
    let guard = 0;
    while (cur.parent_id && byId[cur.parent_id] && guard < 20) {
      cur = byId[cur.parent_id];
      guard++;
    }
    return cur.id;
  }
  const roots = comments.filter((c) => !c.parent_id);
  const repliesByRoot = {};
  roots.forEach((r) => { repliesByRoot[r.id] = []; });
  comments.forEach((c) => {
    if (c.parent_id) {
      const rootId = findRoot(c);
      if (!repliesByRoot[rootId]) repliesByRoot[rootId] = [];
      repliesByRoot[rootId].push(c);
    }
  });
  return { roots, repliesByRoot, byId };
}

const commentTextCache = {}; // commentId -> آخرین متنِ شناخته‌شده (برای لغوِ ویرایش)

function formatRelativeTime(ts) {
  const diff = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (diff < 5) return "همین الان";
  if (diff < 60) return `${diff} ثانیه پیش`;
  const min = Math.floor(diff / 60);
  if (min < 60) return `${min} دقیقه پیش`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr} ساعت پیش`;
  const day = Math.floor(hr / 24);
  if (day < 30) return `${day} روز پیش`;
  const month = Math.floor(day / 30);
  if (month < 12) return `${month} ماه پیش`;
  const year = Math.floor(month / 12);
  return `${year} سال پیش`;
}

  textEl.dataset.editing = "1";
  textEl.innerHTML = `
    <div class="comment-edit-form">
      <input type="text" id="editInput-${commentId}" />
      <button class="comment-edit-save" onclick="saveEditComment('${commentId}')">ذخیره</button>

    </div>`;
  const input = document.getElementById(`editInput-${commentId}`);
  if (input) {
    input.value = original;
    input.focus();
    input.select();
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") saveEditComment(commentId);
      if (e.key === "Escape") cancelEditComment(commentId);
    });
  }
}

async function saveEditComment(commentId) {
  const input = document.getElementById(`editInput-${commentId}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.disabled = true;
  try {
    const res = await fetch(`${WORKER_URL}/api/comment/edit`, {

    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      alert(data.error);
      return;
    }
    commentTextCache[commentId] = text;
    const textEl = document.getElementById(`commentText-${commentId}`);
    if (textEl) {
      textEl.dataset.editing = "0";
      textEl.textContent = text;
      const body = textEl.closest(".comment-item2-body");

      if (meta && !meta.querySelector(".comment-item2-edited")) {

  }
}

async function loadComments(postId, safeId) {
  const listEl = document.getElementById(`commentsList-${safeId}`);
  listEl.innerHTML = `<div class="comment-empty">در حال بارگذاری...</div>`;
  try {
    const headers = {};
    const token = getToken();
    if (token) headers["Authorization"] = `Bearer ${token}`;
    const res = await fetch(`${WORKER_URL}/api/comments?post_id=${encodeURIComponent(postId)}`, { headers });
    const data = await res.json();
    loadedComments[postId] = true;
    if (!data.comments || data.comments.length === 0) {
      listEl.innerHTML = `<div class="comment-empty">هنوز کامنتی نیست</div>`;
      return;
    }

    const { roots, repliesByRoot, byId } = buildCommentGroups(data.comments);
    listEl.innerHTML = roots.map((root) => {
      const replies = (repliesByRoot[root.id] || []).sort((a, b) => a.date - b.date);
      const rootHtml = renderCommentItem(root, false, null, postId, safeId, replies.length);
      if (replies.length === 0) return rootHtml;

      const repliesHtml = replies.map((r) => {
        const parent = r.parent_id ? byId[r.parent_id] : null;
        const replyToUsername = parent && parent.id !== root.id ? parent.username : null;
        return renderCommentItem(r, true, replyToUsername, postId, safeId, 0);
      }).join("");

      const repliesBoxHtml = `<div class="comment-replies-box hidden" id="repliesBox-${root.id}">${repliesHtml}</div>`;
      return rootHtml + repliesBoxHtml;
    }).join("");
  } catch (e) {
    listEl.innerHTML = `<div class="comment-empty">کامنت‌ها بارگذاری نشدن</div>`;
  }
}

async function submitComment(postId, safeId, parentId) {
  const inputId = parentId ? `replyInput-${parentId}` : `commentInput-${safeId}`;
  const input = document.getElementById(inputId);
  const errEl = document.getElementById(`commentError-${safeId}`);
  if (!input) return;
  const text = input.value.trim();
  if (errEl) errEl.textContent = "";
  if (!text) return;
  input.disabled = true;
  try {
    const res = await fetch(`${WORKER_URL}/api/comment`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${getToken()}` },
      body: JSON.stringify({ post_id: postId, text, parent_id: parentId || null }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      if (errEl) errEl.textContent = data.error; else alert(data.error);
      return;
    }
    input.value = "";
    if (parentId) {
      const replyForm = document.getElementById(`replyForm-${parentId}`);
      if (replyForm) replyForm.classList.remove("open");
    }
    loadComments(postId, safeId);
  } catch (e) {
    if (errEl) errEl.textContent = "اتصال به سرور برقرار نشد"; else alert("اتصال به سرور برقرار نشد");
  } finally {
    input.disabled = false;
  }
}

    text = `<b>${escapeHtml(n.from_username)}</b> به کامنتت پاسخ داد`;
  } else if (n.type === "vote") {
    text = `<b>${escapeHtml(n.from_username)}</b> به پستت آپ‌ووت داد`;
  }
  const snippet = n.text ? `<div class="notif-snippet">${escapeHtml(n.text)}</div>` : "";
  const newDot = n.is_new ? `<div class="notif-new-dot"></div>` : "";
  return `
    <div class="notif-item ${n.is_new ? "is-new" : ""}" onclick="openPostFromNotification(${idx})">
      <div class="notif-icon">${notifIcon(n.type)}</div>
      <div class="notif-body">
        <div class="notif-text">${text}</div>
        ${snippet}
        <div class="notif-time">${new Date(n.date).toLocaleString("fa-IR")}</div>
      </div>
      ${newDot}
    </div>`;
}

async function loadNotifications(reset = true) {
  const listEl = document.getElementById("notificationsList");
  if (reset) {
    notifState.page = 1;
    listEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
  }
  try {
    const res = await fetch(`${WORKER_URL}/api/notifications?page=${notifState.page}&pageSize=20`, {
      headers: { "Authorization": `Bearer ${getToken()}` },
    });
    const data = await res.json();

    if (!res.ok) {
      listEl.innerHTML = `<div class="empty-state">${escapeHtml(data.error || "خطا در بارگذاری")}</div>`;
      return;
    }

    if (reset && (!data.notifications || data.notifications.length === 0)) {
      listEl.innerHTML = `<div class="empty-state">هنوز اعلانی نداری</div>`;
    } else {
      if (reset) { listEl.innerHTML = ""; notifCache = []; }
      const startIdx = notifCache.length;
      notifCache.push(...(data.notifications || []));
      listEl.insertAdjacentHTML("beforeend", data.notifications.map((n, i) => renderNotifItem(n, startIdx + i)).join(""));

      const oldBtn = document.getElementById("loadMoreBtn-notif");
      if (oldBtn) oldBtn.remove();
      if (data.hasMore) {
        listEl.insertAdjacentHTML("beforeend", `<button class="load-more-btn" id="loadMoreBtn-notif" onclick="loadMoreNotifications()">بارگذاری بیشتر</button>`);
      }
    }

    if (reset) {
      document.getElementById("bellDot").classList.add("hidden");
      fetch(`${WORKER_URL}/api/notifications/read`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${getToken()}` },
      }).catch(() => {});
    }
  } catch (e) {
    if (reset) listEl.innerHTML = `<div class="empty-state">بارگذاری نشد</div>`;
  }
}

function loadMoreNotifications() {
  notifState.page++;
  loadNotifications(false);
}

async function checkNotificationsBadge() {
  try {
    const res = await fetch(`${WORKER_URL}/api/notifications?page=1&pageSize=1`, {
      headers: { "Authorization": `Bearer ${getToken()}` },
    });
    const data = await res.json();
    if (res.ok && data.unread_count > 0) {
      document.getElementById("bellDot").classList.remove("hidden");
    }
  } catch (e) {}
}

async function loadProfile(username) {
  document.getElementById("profileUsername").textContent = username;
  document.getElementById("profileBioView").textContent = "";
  document.getElementById("profileFeed").innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
  document.getElementById("profileEditBlock").classList.add("hidden");
  resetReportBlock();
  clearAvatarFile();

  try {
    const res = await fetch(`${WORKER_URL}/api/profile?username=${encodeURIComponent(username)}`, {
      headers: { "Authorization": `Bearer ${getToken()}` },
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById("profileBioView").textContent = data.error || "پروفایل پیدا نشد";
      return;
    }
    const p = data.profile;
    const avatarWrap = document.getElementById("profileAvatarWrap");
    if (p.avatar_file_id) {
      avatarWrap.style.background = "transparent";
      avatarWrap.innerHTML = `<img src="${WORKER_URL}/api/media/${p.avatar_file_id}" />`;
    } else {
      avatarWrap.style.background = avatarColor(username);
      avatarWrap.textContent = username[0].toUpperCase();
    }

    const isSelf = username === getUsername();
    document.getElementById("profileBioView").textContent = p.bio || (isSelf ? "هنوز بایویی ننوشتی" : "بایویی ثبت نشده");

    if (isSelf) {
      document.getElementById("profileEditBlock").classList.remove("hidden");
      document.getElementById("profileBioInput").value = p.bio || "";
      markActiveSwatch(currentTheme);
    } else {
      document.getElementById("reportBlock").classList.remove("hidden");
      document.getElementById("reportBlock").dataset.targetUsername = username;
      if (p.reported_by_me) {
        document.getElementById("reportAlreadyMsg").classList.remove("hidden");
        document.getElementById("reportToggleBtn").classList.add("hidden");
      }
    }

    loadProfilePosts(username, true);
  } catch (e) {
    document.getElementById("profileBioView").textContent = "خطا در بارگذاری پروفایل";
  }
}

function resetReportBlock() {
  const block = document.getElementById("reportBlock");
  block.classList.add("hidden");
  block.dataset.targetUsername = "";
  document.getElementById("reportToggleBtn").classList.remove("hidden");
  document.getElementById("reportAlreadyMsg").classList.add("hidden");
  document.getElementById("reportForm").classList.add("hidden");
  document.getElementById("reportReasonInput").value = "";
  document.getElementById("reportError").textContent = "";
  updateReportCharCount();
}

function toggleReportForm() {
  document.getElementById("reportForm").classList.toggle("hidden");
}

function updateReportCharCount() {
  const len = document.getElementById("reportReasonInput").value.length;
  document.getElementById("reportCharCount").textContent = `${len.toLocaleString("fa-IR")}/۸۰`;
}

async function submitReport() {
  const targetUsername = document.getElementById("reportBlock").dataset.targetUsername;
  const reason = document.getElementById("reportReasonInput").value.trim();
  const errEl = document.getElementById("reportError");
  const btn = document.getElementById("reportSubmitBtn");
  errEl.textContent = "";

  if (!reason) { errEl.textContent = "دلیل گزارش رو بنویس"; return; }
  if (reason.length > 80) { errEl.textContent = "توضیحات نباید بیشتر از ۸۰ کاراکتر باشه"; return; }

  btn.disabled = true;
  btn.textContent = "در حال ارسال...";
  try {
    const res = await fetch(`${WORKER_URL}/api/report`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${getToken()}` },
      body: JSON.stringify({ target_username: targetUsername, reason }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      errEl.textContent = data.error || "ارسال گزارش ناموفق بود";
      return;
    }
    document.getElementById("reportForm").classList.add("hidden");
    document.getElementById("reportToggleBtn").classList.add("hidden");
    document.getElementById("reportAlreadyMsg").classList.remove("hidden");
  } catch (e) {
    errEl.textContent = "اتصال به سرور برقرار نشد";
  } finally {
    btn.disabled = false;
    btn.textContent = "ارسال گزارش";
  }
}

async function loadProfilePosts(username, reset) {
  const feedEl = document.getElementById("profileFeed");
  const gridFilters = ["media", "audio"];
  const isGrid = gridFilters.includes(profileState.filter);

  if (reset) {
    profileState.page = 1;
    profileState.postsCache = {};
    feedEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
  }
  try {
    const excludeAudio = (profileState.filter === "all" || profileState.filter === "media") ? "&excludeAudio=1" : "";
    const res = await fetch(`${WORKER_URL}/api/feed?username=${encodeURIComponent(username)}&filter=${profileState.filter}&page=${profileState.page}&pageSize=${PAGE_SIZE}${excludeAudio}`, {
      headers: { "Authorization": `Bearer ${getToken()}` },
    });
    const data = await res.json();

    if (reset && (!data.posts || data.posts.length === 0)) {
      feedEl.innerHTML = `<div class="empty-state">هنوز پستی از این کاربر نیست</div>`;
      return;
    }

    const startIndex = (profileState.page - 1) * PAGE_SIZE;
    data.posts.forEach((p, i) => {
      profileState.postsCache[p.id] = { ...p, __num: data.total - (startIndex + i) };
    });

    if (isGrid) {
      let gridEl;
      if (reset) {
        feedEl.innerHTML = `<div class="profile-grid" id="profileGrid"></div>`;
        gridEl = document.getElementById("profileGrid");
      } else {
        gridEl = document.getElementById("profileGrid");
      }
      const html = data.posts.map((p) => renderProfileGridItem(p)).join("");
      gridEl.insertAdjacentHTML("beforeend", html);
    } else {
      if (reset) feedEl.innerHTML = "";
      const html = data.posts.map((p) => renderPost(p, profileState.postsCache[p.id].__num)).join("");
      feedEl.insertAdjacentHTML("beforeend", html);
      bindAllAudioPlayers(feedEl);
    }

    const oldBtn = document.getElementById("loadMoreBtn-profile");
    if (oldBtn) oldBtn.remove();
    if (data.hasMore) {
      feedEl.insertAdjacentHTML("beforeend", `<button class="load-more-btn" id="loadMoreBtn-profile" onclick="loadMoreProfile()">بارگذاری بیشتر</button>`);
    }
  } catch (e) {
    if (reset) feedEl.innerHTML = `<div class="empty-state">فید بارگذاری نشد</div>`;
  }
}

function renderProfileGridItem(p) {
  let mediaHtml = "";
  let badge = "";
  if (p.type === "photo") {
    mediaHtml = `<img src="${WORKER_URL}/api/media/${p.file_id}" loading="lazy" />`;
  } else if (p.type === "video") {
    mediaHtml = `<video src="${WORKER_URL}/api/media/${p.file_id}" preload="metadata" muted playsinline></video>`;
    badge = `<div class="grid-item-badge">${ICON_PLAY}</div>`;
  } else if (p.type === "audio") {
    mediaHtml = p.audio_thumb
      ? `<img src="${WORKER_URL}/api/media/${p.audio_thumb}" loading="lazy" />`
      : `<div class="grid-item-noart">${ICON_MUSIC}</div>`;
    badge = `<div class="grid-item-badge">${ICON_MUSIC}</div>`;
  } else {
    mediaHtml = `<div class="grid-item-noart">${ICON_DOWNLOAD}</div>`;
  }
  return `<div class="grid-item" onclick="openPostModal('${p.id}')">${mediaHtml}${badge}</div>`;
}

async function openPostModal(postId, commentIdToHighlight) {
  let post = profileState.postsCache[postId];
  let num = post ? post.__num : null;
  const contentEl = document.getElementById("postModalContent");
  document.getElementById("postModalOverlay").classList.remove("hidden");

  if (!post) {
    contentEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
    try {
      const res = await fetch(`${WORKER_URL}/api/post?id=${encodeURIComponent(postId)}`, {
        headers: { "Authorization": `Bearer ${getToken()}` },
      });
      const data = await res.json();
      if (!res.ok) {
        contentEl.innerHTML = `<div class="empty-state">${escapeHtml(data.error || "پست پیدا نشد")}</div>`;
        return;
      }
      post = data.post;
      num = data.number;
    } catch (e) {
      contentEl.innerHTML = `<div class="empty-state">پست بارگذاری نشد</div>`;
      return;
    }
  }

  contentEl.innerHTML = renderPost(post, num);
  bindAllAudioPlayers(contentEl);

  if (commentIdToHighlight) {
    const safeId = post.id.replace(/[^a-zA-Z0-9_]/g, "");
    await openCommentsAndHighlight(post.id, safeId, commentIdToHighlight);
  }
}

// باز کردنِ بخش کامنت‌ها و اسکرول+هایلایتِ یه کامنت خاص (برای وقتی از رو اعلان باز می‌شیم)
async function openCommentsAndHighlight(postId, safeId, commentId) {
  const section = document.getElementById(`comments-${safeId}`);
  if (section) section.classList.remove("hidden");
  await loadComments(postId, safeId);
  if (!commentId) return;

  const target = document.getElementById(`commentItem-${commentId}`);
  if (!target) return;

  const repliesBox = target.closest(".comment-replies-box");
  if (repliesBox && repliesBox.classList.contains("hidden")) {
    toggleRepliesBox(repliesBox.id.replace("repliesBox-", ""));
  }
  target.scrollIntoView({ behavior: "smooth", block: "center" });
  target.classList.add("comment-highlight");
  setTimeout(() => target.classList.remove("comment-highlight"), 2500);
}

function closePostModal() {
  const overlay = document.getElementById("postModalOverlay");
  overlay.classList.add("hidden");
  // متوقف کردن هر ویدیو/آهنگی که داخل مودال در حال پخش بود
  document.getElementById("postModalContent").querySelectorAll("video, audio").forEach((el) => el.pause());
  document.getElementById("postModalContent").innerHTML = "";
}

function loadMoreProfile() {
  profileState.page++;
  loadProfilePosts(profileState.username, false);
}

function setProfileFilter(filter) {
  profileState.filter = filter;
  document.querySelectorAll(".filter-chip").forEach((el) => el.classList.remove("active"));
  document.getElementById(`profFilter-${filter}`)?.classList.add("active");
  loadProfilePosts(profileState.username, true);
}

function onAvatarChosen() {
  const input = document.getElementById("avatarInput");
  selectedAvatarFile = input.files[0] || null;
  document.getElementById("avatarChip").classList.toggle("hidden", !selectedAvatarFile);
  document.getElementById("avatarAttachLabel").classList.toggle("hidden", !!selectedAvatarFile);
  if (selectedAvatarFile) document.getElementById("avatarFileName").textContent = selectedAvatarFile.name;
}
function clearAvatarFile() {
  selectedAvatarFile = null;
  const input = document.getElementById("avatarInput");
  if (input) input.value = "";
  document.getElementById("avatarChip").classList.add("hidden");
  document.getElementById("avatarAttachLabel").classList.remove("hidden");
}

async function saveProfile() {
  const bio = document.getElementById("profileBioInput").value.trim();
  const errEl = document.getElementById("profileError");
  const btn = document.getElementById("saveProfileBtn");
  errEl.textContent = "";

  const fd = new FormData();
  fd.append("bio", bio);
  if (selectedAvatarFile) fd.append("avatar", selectedAvatarFile);

  btn.disabled = true;
  btn.textContent = "در حال ذخیره...";
  try {
    const res = await fetch(`${WORKER_URL}/api/profile`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${getToken()}` },
      body: fd,
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      errEl.textContent = data.error;
      return;
    }
    loadProfile(getUsername());
  } catch (e) {
    errEl.textContent = "اتصال به سرور برقرار نشد";
  } finally {
    btn.disabled = false;
    btn.textContent = "ذخیره پروفایل";
  }
}

(async () => {
  await initAdminStatus();
  syncThemeFromServer();
  switchView("media");
})();
</script>
