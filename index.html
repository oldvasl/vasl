<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasl</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div class="tab">ریلز</div>

</div>

<div id="feed">

<div class="postHeader">

<div class="userInfo">

</div>

</div>

</video>

<!-- caption -->
<div class="caption">

</div>

</div>

</div>
