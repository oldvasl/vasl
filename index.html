<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>دفتر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1A0A31;
    --surface: #241243;
    --card: #2D1856;
    --accent: #8B5CF6;
    --accent-hover: #A78BFA;
    --text: #FFFFFF;
    --subtext: #C9C4D8;
    --border: #3D2A64;
    --success: #22C55E;
    --error: #EF4444;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: var(--primary);
    color: var(--text);
    line-height: 1.7;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px 16px 60px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
  .brand p { font-size: 13px; color: var(--subtext); margin: 0; }
  .who { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--subtext); }
  .logout-link { color: var(--subtext); background: none; border: none; text-decoration: underline; cursor: pointer; font-family: inherit; font-size: 13px; padding: 0; }

  /* نوار سوییچ بخش‌ها (بالای صفحه) */
  .top-nav {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    display: grid; grid-template-columns: repeat(4, 1fr);
    margin-bottom: 18px; overflow: hidden;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 4px; background: none; border: none; color: var(--subtext);
    font-family: inherit; font-size: 11px; cursor: pointer; border-inline-start: 1px solid var(--border);
  }
  .nav-item:first-child { border-inline-start: none; }
  .nav-item svg { width: 19px; height: 19px; }
  .nav-item.active { color: #fff; background: var(--accent); }
  .nav-item.coming-soon { opacity: 0.6; }

  .view.hidden { display: none !important; }

  .surface-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--text);
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; margin-bottom: 8px; resize: vertical; min-height: 90px;
  }
  textarea::placeholder { color: var(--subtext); }
  textarea:focus { outline: none; border-color: var(--accent); }

  button.primary {
    padding: 10px 16px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff; font-family: inherit; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.15s; width: 100%;
  }
  button.primary:hover { background: var(--accent-hover); }
  button.primary:disabled { opacity: 0.5; cursor: default; }

  .composer-tools { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .attach-btn {
    display: flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; font-size: 13px; color: var(--subtext); cursor: pointer; flex: 1;
  }
  .attach-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .file-chip {
    display: flex; align-items: center; gap: 6px; background: rgba(139,92,246,0.15); color: var(--accent-hover);
    border: 1px solid var(--accent); border-radius: 8px; padding: 8px 12px; font-size: 13px; flex: 1;
  }
  .file-chip button { background: none; border: none; color: var(--accent-hover); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; font-family: inherit; }
  .submit-row { margin-top: 14px; }

  .error { color: var(--error); font-size: 13px; margin-top: 8px; min-height: 16px; }

  .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .feed-header span { font-size: 13px; color: var(--subtext); }
  .refresh-btn { background: none; border: none; color: var(--subtext); font-size: 13px; text-decoration: underline; cursor: pointer; font-family: inherit; padding: 0; }

  /* ردیف متنی ساده برای پست‌های بدون رسانه */
  .text-entry {
    border-inline-start: 3px solid var(--border);
    padding-inline-start: 14px;
    margin-bottom: 18px;
  }

  /* post card برای پست‌های مدیا (عکس/ویدیو/آهنگ/فایل) */
  .post-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }
  .post-card .entry-top { padding: 10px 12px 0; }
  .post-card .entry-text { padding: 6px 12px 0; font-size: 14px; }
  .post-card .entry-media { padding: 8px 0 0; }
  .post-card .entry-media img, .post-card .entry-media video { width: 100%; display: block; max-height: 320px; object-fit: cover; }
  .post-card .entry-media audio { width: 100%; display: block; }
  .post-card .entry-media.has-audio { padding: 8px 12px 0; }
  .post-card .entry-time { padding: 8px 12px 10px; }
  .post-card .entry-doc { margin: 8px 12px 0; }

  .entry-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%; color: #fff; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .entry-name { font-weight: 500; font-size: 14px; }
  .entry-meta { display: flex; align-items: center; gap: 10px; margin-inline-start: auto; }
  .entry-num { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--subtext); }
  .delete-btn { background: none; border: none; color: var(--error); font-size: 11px; cursor: pointer; font-family: inherit; padding: 0; text-decoration: underline; }
  .entry-text { font-size: 15px; white-space: pre-wrap; }
  .entry-doc { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 13px; }
  .entry-doc a { color: var(--accent-hover); }
  .entry-time { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--subtext); margin-top: 6px; }

  .load-more-btn {
    display: block; width: 100%; text-align: center; margin-top: 6px; padding: 10px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--subtext); font-family: inherit; font-size: 13px; cursor: pointer;
  }
  .load-more-btn:hover { color: var(--text); border-color: var(--accent); }

  .empty-state { text-align: center; padding: 30px 10px; color: var(--subtext); font-size: 14px; }
  .hidden { display: none !important; }

  /* بخش کامنت‌ها */
  .comments-toggle {
    background: none; border: none; color: var(--accent-hover); font-size: 13px;
    cursor: pointer; font-family: inherit; padding: 0; margin-top: 8px;
  }
  .text-entry .comments-toggle, .text-entry .comments-section { margin-inline-start: 0; }
  .post-card .comments-wrap { padding: 0 12px 10px; }
  .comments-section { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .comment-item { padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .comment-item:last-child { border-bottom: none; }
  .comment-item b { color: var(--accent-hover); font-weight: 500; }
  .comment-time { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--subtext); margin-inline-start: 6px; }
  .comment-empty { font-size: 12px; color: var(--subtext); padding: 4px 0; }
  .comment-form { display: flex; gap: 6px; margin-top: 8px; }
  .comment-form input {
    flex: 1; font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px;
  }
  .comment-form input::placeholder { color: var(--subtext); }
  .comment-form input:focus { outline: none; border-color: var(--accent); }
  .comment-form button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0 14px;
    font-family: inherit; font-size: 13px; cursor: pointer;
  }
  .comment-form button:hover { background: var(--accent-hover); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1>دفتر</h1>
      <p>فید عمومی</p>
    </div>
    <div class="who">
      <span id="whoami"></span>
      <button class="logout-link" onclick="logout()">خروج</button>
    </div>
  </header>

  <!-- نوار سوییچ بخش‌ها: رسانه / متن / پست جدید / چت -->
  <nav class="top-nav">
    <button class="nav-item active" id="navBtn-media" onclick="switchView('media')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>رسانه</span>
    </button>
    <button class="nav-item" id="navBtn-text" onclick="switchView('text')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      <span>متن</span>
    </button>
    <button class="nav-item" id="navBtn-upload" onclick="switchView('upload')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      <span>پست جدید</span>
    </button>
    <button class="nav-item coming-soon" id="navBtn-chat" onclick="switchView('chat')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>چت</span>
    </button>
  </nav>

  <!-- بخش رسانه‌ها -->
  <div id="view-media" class="view">
    <div class="feed-header">
      <span>رسانه‌ها</span>
      <button class="refresh-btn" onclick="loadFeedView('media', true)">بروزرسانی</button>
    </div>
    <div id="mediaFeed"></div>
  </div>

  <!-- بخش متن‌ها -->
  <div id="view-text" class="view hidden">
    <div class="feed-header">
      <span>متن‌ها</span>
      <button class="refresh-btn" onclick="loadFeedView('text', true)">بروزرسانی</button>
    </div>
    <div id="textFeed"></div>
  </div>

  <!-- بخش پست جدید -->
  <div id="view-upload" class="view hidden">
    <div class="surface-card">
      <textarea id="postText" placeholder="چی می‌خوای توی دفتر ثبت کنی؟"></textarea>
      <div class="composer-tools">
        <label class="attach-btn" id="attachLabel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.5V7a2 2 0 0 0-2-2H9L7 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6"/><circle cx="17" cy="17" r="4"/><path d="M17 15.5v3M15.5 17h3"/></svg>
          عکس، ویدیو یا آهنگ
          <input type="file" id="fileInput" accept="image/*,video/*,audio/*" class="hidden" onchange="onFileChosen()" />
        </label>
        <div class="file-chip hidden" id="fileChip">
          <span id="fileName"></span>
          <button onclick="clearFile()">×</button>
        </div>
      </div>
      <div class="submit-row">
        <button class="primary" id="submitBtn" onclick="submitPost()">ثبت در دفتر</button>
      </div>
      <div class="error" id="postError"></div>
    </div>
  </div>

  <!-- بخش چت خصوصی (به‌زودی) -->
  <div id="view-chat" class="view hidden">
    <div class="surface-card" style="text-align:center; padding:50px 20px;">
      <p style="font-size:15px; color:var(--subtext); margin:0;">چت خصوصی به‌زودی راه‌اندازی می‌شه.</p>
    </div>
  </div>

</div>

<script>
const WORKER_URL = "https://VLC.alipviv8698.workers.dev";

if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}

function getToken() { return localStorage.getItem("token"); }
function getUsername() { return localStorage.getItem("username"); }

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

document.getElementById("whoami").textContent = getUsername() || "";

const feedState = {
  media: { page: 1, loaded: false },
  text: { page: 1, loaded: false },
};

function switchView(name, forceReload = false) {
  document.querySelectorAll(".view").forEach((el) => el.classList.add("hidden"));
  document.getElementById(`view-${name}`).classList.remove("hidden");
  document.querySelectorAll(".nav-item").forEach((el) => el.classList.remove("active"));
  document.getElementById(`navBtn-${name}`).classList.add("active");

  if ((name === "media" || name === "text") && (forceReload || !feedState[name].loaded)) {
    loadFeedView(name, true);
  }
}

let selectedFile = null;
function onFileChosen() {
  const input = document.getElementById("fileInput");
  selectedFile = input.files[0] || null;
  document.getElementById("fileChip").classList.toggle("hidden", !selectedFile);
  document.getElementById("attachLabel").classList.toggle("hidden", !!selectedFile);
  if (selectedFile) document.getElementById("fileName").textContent = selectedFile.name;
}
function clearFile() {
  selectedFile = null;
  document.getElementById("fileInput").value = "";
  document.getElementById("fileChip").classList.add("hidden");
  document.getElementById("attachLabel").classList.remove("hidden");
}

async function submitPost() {
  const text = document.getElementById("postText").value.trim();
  const errEl = document.getElementById("postError");
  const btn = document.getElementById("submitBtn");
  errEl.textContent = "";

  if (!text && !selectedFile) { errEl.textContent = "چیزی برای ثبت وارد نکردی"; return; }

  const fd = new FormData();
  fd.append("text", text);
  if (selectedFile) fd.append("file", selectedFile);
  const targetView = selectedFile ? "media" : "text";

  btn.disabled = true;
  btn.textContent = "در حال ارسال...";
  try {
    const res = await fetch(`${WORKER_URL}/api/post`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${getToken()}` },
      body: fd,
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      errEl.textContent = data.error;
      return;
    }
    document.getElementById("postText").value = "";
    clearFile();
    switchView(targetView, true);
  } catch (e) {
    errEl.textContent = "اتصال به سرور برقرار نشد. دوباره امتحان کن.";
  } finally {
    btn.disabled = false;
    btn.textContent = "ثبت در دفتر";
  }
}

function avatarColor(name) {
  const palette = ["#8B5CF6", "#22C55E", "#3B82F6", "#F59E0B", "#EF4444", "#EC4899"];
  let sum = 0;
  for (const ch of name) sum += ch.charCodeAt(0);
  return palette[sum % palette.length];
}

const PAGE_SIZE = 10;

function renderPost(p, num) {
  const initial = p.username ? p.username[0].toUpperCase() : "?";
  const hasMedia = (p.type === "photo" || p.type === "video" || p.type === "audio" || p.type === "document") && p.file_id;
  const isOwner = p.username === getUsername();
  const numStr = String(num).padStart(6, "0");
  const safeId = p.id.replace(/[^a-zA-Z0-9_]/g, "");

  const deleteBtn = isOwner ? `<button class="delete-btn" onclick="deletePost('${p.id}','${safeId}')">حذف</button>` : "";
  const header = `
    <div class="entry-top">
      <div class="avatar" style="background:${avatarColor(p.username || "")}">${initial}</div>
      <span class="entry-name">${escapeHtml(p.username)}</span>
      <div class="entry-meta">
        <span class="entry-num">#${numStr}</span>
        ${deleteBtn}
      </div>
    </div>`;
  const textHtml = p.text ? `<div class="entry-text">${escapeHtml(p.text)}</div>` : "";
  const timeHtml = `<div class="entry-time">${new Date(p.date).toLocaleString("fa-IR")}</div>`;
  const commentsBlock = `
    <button class="comments-toggle" onclick="toggleComments('${p.id}','${safeId}')">نمایش کامنت‌ها</button>
    <div class="comments-section hidden" id="comments-${safeId}">
      <div id="commentsList-${safeId}"></div>
      <div class="comment-form">
        <input type="text" id="commentInput-${safeId}" placeholder="یه کامنت بنویس..." onkeydown="if(event.key==='Enter') submitComment('${p.id}','${safeId}')" />
        <button onclick="submitComment('${p.id}','${safeId}')">ارسال</button>
      </div>
      <div class="error" id="commentError-${safeId}"></div>
    </div>`;

  if (!hasMedia) {
    return `<div class="text-entry" id="post-${safeId}">${header}${textHtml}${timeHtml}${commentsBlock}</div>`;
  }

  let mediaHtml = "";
  if (p.type === "photo") {
    mediaHtml = `<div class="entry-media"><img src="${WORKER_URL}/api/media/${p.file_id}" loading="lazy" /></div>`;
  } else if (p.type === "video") {
    mediaHtml = `<div class="entry-media"><video src="${WORKER_URL}/api/media/${p.file_id}" controls></video></div>`;
  } else if (p.type === "audio") {
    mediaHtml = `<div class="entry-media has-audio"><audio src="${WORKER_URL}/api/media/${p.file_id}" controls></audio></div>`;
  } else if (p.type === "document") {
    mediaHtml = `<div class="entry-doc">فایل پیوست — <a href="${WORKER_URL}/api/media/${p.file_id}" target="_blank">دانلود</a></div>`;
  }

  return `<div class="post-card" id="post-${safeId}">${header}${textHtml}${mediaHtml}${timeHtml}<div class="comments-wrap">${commentsBlock}</div></div>`;
}

async function loadFeedView(kind, reset = true) {
  const containerId = kind === "media" ? "mediaFeed" : "textFeed";
  const feedEl = document.getElementById(containerId);
  if (reset) {
    feedState[kind].page = 1;
    feedEl.innerHTML = `<div class="empty-state">در حال بارگذاری...</div>`;
  }
  try {
    const res = await fetch(`${WORKER_URL}/api/feed?filter=${kind}&page=${feedState[kind].page}&pageSize=${PAGE_SIZE}`);
    const data = await res.json();
    feedState[kind].loaded = true;

    if (reset && (!data.posts || data.posts.length === 0)) {
      const emptyMsg = kind === "media" ? "هنوز رسانه‌ای ثبت نشده" : "هنوز متنی ثبت نشده";
      feedEl.innerHTML = `<div class="empty-state">${emptyMsg} — اولین نفر باش.</div>`;
      return;
    }
    if (reset) feedEl.innerHTML = "";

    const startIndex = (feedState[kind].page - 1) * PAGE_SIZE;
    const html = data.posts.map((p, i) => renderPost(p, data.total - (startIndex + i))).join("");
    feedEl.insertAdjacentHTML("beforeend", html);

    const oldBtn = document.getElementById(`loadMoreBtn-${kind}`);
    if (oldBtn) oldBtn.remove();
    if (data.hasMore) {
      feedEl.insertAdjacentHTML("beforeend", `<button class="load-more-btn" id="loadMoreBtn-${kind}" onclick="loadMoreFeed('${kind}')">بارگذاری بیشتر</button>`);
    }
  } catch (e) {
    if (reset) feedEl.innerHTML = `<div class="empty-state">فید بارگذاری نشد. اتصال اینترنتت رو چک کن.</div>`;
  }
}

function loadMoreFeed(kind) {
  feedState[kind].page++;
  loadFeedView(kind, false);
}

async function deletePost(id, safeId) {
  if (!confirm("مطمئنی می‌خوای این پست رو حذف کنی؟ این کار برگشت‌پذیر نیست.")) return;
  try {
    const res = await fetch(`${WORKER_URL}/api/post?id=${encodeURIComponent(id)}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${getToken()}` },
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      alert(data.error);
      return;
    }
    const el = document.getElementById(`post-${safeId}`);
    if (el) el.remove();
  } catch (e) {
    alert("اتصال به سرور برقرار نشد");
  }
}

const loadedComments = {};

function toggleComments(postId, safeId) {
  const section = document.getElementById(`comments-${safeId}`);
  section.classList.toggle("hidden");
  if (!section.classList.contains("hidden") && !loadedComments[postId]) {
    loadComments(postId, safeId);
  }
}

async function loadComments(postId, safeId) {
  const listEl = document.getElementById(`commentsList-${safeId}`);
  listEl.innerHTML = `<div class="comment-empty">در حال بارگذاری...</div>`;
  try {
    const res = await fetch(`${WORKER_URL}/api/comments?post_id=${encodeURIComponent(postId)}`);
    const data = await res.json();
    loadedComments[postId] = true;
    if (!data.comments || data.comments.length === 0) {
      listEl.innerHTML = `<div class="comment-empty">هنوز کامنتی نیست</div>`;
      return;
    }
    listEl.innerHTML = data.comments.map(c => `
      <div class="comment-item">
        <b>${escapeHtml(c.username)}</b>
        <span>${escapeHtml(c.text)}</span>
        <span class="comment-time">${new Date(c.date).toLocaleString("fa-IR")}</span>
      </div>
    `).join("");
  } catch (e) {
    listEl.innerHTML = `<div class="comment-empty">کامنت‌ها بارگذاری نشدن</div>`;
  }
}

async function submitComment(postId, safeId) {
  const input = document.getElementById(`commentInput-${safeId}`);
  const errEl = document.getElementById(`commentError-${safeId}`);
  const text = input.value.trim();
  errEl.textContent = "";
  if (!text) return;
  input.disabled = true;
  try {
    const res = await fetch(`${WORKER_URL}/api/comment`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${getToken()}` },
      body: JSON.stringify({ post_id: postId, text }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      errEl.textContent = data.error;
      return;
    }
    input.value = "";
    loadComments(postId, safeId);
  } catch (e) {
    errEl.textContent = "اتصال به سرور برقرار نشد";
  } finally {
    input.disabled = false;
  }
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

switchView("media");
</script>
