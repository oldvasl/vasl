name: Build TWA APK

on:
  workflow_dispatch:
  push:
    paths:
      - "twa-manifest.json"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: چک‌اوت
        uses: actions/checkout@v4

      - name: نصب جاوا
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: نصب Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: نصب Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: بازسازی فایل کیستور از Secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: دیباگ - نمایش محتوای workspace
        run: |
          echo "مسیر فعلی:"
          pwd
          echo "محتوای این پوشه:"
          ls -la
          echo "جستجوی twa-manifest.json در کل ریپو:"
          find . -iname "twa-manifest.json"

      - name: نصب Android SDK Command-line Tools
        uses: android-actions/setup-android@v3

      - name: نصب ابزار expect
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: ساخت اسکریپت پاسخ‌گویی خودکار به سوالات Bubblewrap
        run: |
          cat > run-build.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 1800
          spawn bubblewrap build --skipPwaValidation --skipVersionUpgrade --manifest ./twa-manifest.json
          expect {
            -re {install the JDK[^\r\n]*\(Y/n\)} { send "n\r"; exp_continue }
            -re {Path to your existing JDK[^\r\n]*:} { send "$env(JAVA_HOME)\r"; exp_continue }
            -re {install the Android SDK[^\r\n]*\(Y/n\)} { send "n\r"; exp_continue }
            -re {Path to your existing Android SDK[^\r\n]*:} { send "$env(ANDROID_HOME)\r"; exp_continue }
            -re {\(y/N\)} { send "y\r"; exp_continue }
            -re {\(Y/n\)} { send "y\r"; exp_continue }
            eof
          }
          catch wait result
          exit [lindex $result 3]
          EOF
          chmod +x run-build.exp

      - name: دانلود Android SDK و ساخت پروژه
        run: ./run-build.exp
        env:
          # bubblewrap موقع build از این متغیرها برای پسورد کیستور استفاده می‌کنه
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: پیدا کردن و آپلود APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            app-release-signed.apk
          if-no-files-found: warn
